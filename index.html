<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>A Mother&rsquo;s Day Wordle</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
  }
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background:
      radial-gradient(ellipse at 20% 0%, #fce7f3 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, #ede9fe 0%, transparent 60%),
      linear-gradient(180deg, #fff5fa 0%, #fdf2f8 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    color: #2a2a2a;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .flower-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .game {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 460px;
    background: rgba(255, 255, 255, 0.78);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 18px;
    padding: 18px 16px 14px;
    box-shadow: 0 10px 40px rgba(190, 100, 160, 0.18);
    text-align: center;
  }

  h1 {
    margin: 0 0 2px;
    font-size: 22px;
    letter-spacing: 0.5px;
    color: #be185d;
    font-weight: 800;
  }
  .subtitle {
    margin: 0 0 10px;
    font-size: 11px;
    color: #a78aaa;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  #message {
    height: 20px;
    font-size: 13px;
    color: #be185d;
    margin-bottom: 6px;
    font-weight: 600;
  }

  #board {
    display: grid;
    grid-template-rows: repeat(6, 1fr);
    gap: 5px;
    margin: 0 auto 12px;
    width: 100%;
    max-width: 360px;
  }
  .row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
  }
  .cell {
    aspect-ratio: 1 / 1;
    border: 2px solid #d3d6da;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(16px, 5.5vw, 26px);
    font-weight: 700;
    text-transform: uppercase;
    background: white;
    color: #1a1a1b;
    transition: border-color 0.12s, transform 0.1s;
  }
  .cell.filled {
    border-color: #878a8c;
    animation: pop 0.12s ease;
  }
  @keyframes pop {
    50% { transform: scale(1.08); }
  }
  .cell.flip {
    animation: flip 0.5s ease forwards;
  }
  @keyframes flip {
    0%   { transform: rotateX(0); }
    50%  { transform: rotateX(90deg); }
    100% { transform: rotateX(0); }
  }
  .cell.correct { background: #6aaa64; border-color: #6aaa64; color: white; }
  .cell.present { background: #c9b458; border-color: #c9b458; color: white; }
  .cell.absent  { background: #787c7e; border-color: #787c7e; color: white; }

  .row.shake { animation: shake 0.5s; }
  @keyframes shake {
    10%, 90% { transform: translateX(-1px); }
    20%, 80% { transform: translateX(2px); }
    30%, 50%, 70% { transform: translateX(-5px); }
    40%, 60% { transform: translateX(5px); }
  }

  .row.win-bounce .cell { animation: bounce 0.6s ease; }
  .row.win-bounce .cell:nth-child(1) { animation-delay: 0.00s; }
  .row.win-bounce .cell:nth-child(2) { animation-delay: 0.08s; }
  .row.win-bounce .cell:nth-child(3) { animation-delay: 0.16s; }
  .row.win-bounce .cell:nth-child(4) { animation-delay: 0.24s; }
  .row.win-bounce .cell:nth-child(5) { animation-delay: 0.32s; }
  .row.win-bounce .cell:nth-child(6) { animation-delay: 0.40s; }
  .row.win-bounce .cell:nth-child(7) { animation-delay: 0.48s; }
  @keyframes bounce {
    0%, 20%   { transform: translateY(0); }
    40%       { transform: translateY(-22px); }
    50%       { transform: translateY(4px); }
    60%       { transform: translateY(-8px); }
    80%, 100% { transform: translateY(0); }
  }

  #keyboard {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 8px;
  }
  .kb-row {
    display: flex;
    justify-content: center;
    gap: 4px;
  }
  .key {
    flex: 1;
    min-width: 0;
    height: 48px;
    padding: 0 4px;
    border: none;
    border-radius: 5px;
    background: #d3d6da;
    color: #1a1a1b;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.12s, transform 0.05s;
    font-family: inherit;
  }
  .key.wide { flex: 1.5; font-size: 11px; }
  .key:hover { background: #c0c4c8; }
  .key:active { transform: scale(0.96); }
  .key.correct { background: #6aaa64; color: white; }
  .key.present { background: #c9b458; color: white; }
  .key.absent  { background: #787c7e; color: white; }

  #retry {
    background: linear-gradient(135deg, #ec4899, #a855f7);
    color: white;
    border: none;
    border-radius: 999px;
    padding: 10px 22px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.15s;
    box-shadow: 0 4px 14px rgba(168, 85, 247, 0.35);
    font-family: inherit;
  }
  #retry:hover { box-shadow: 0 6px 20px rgba(168, 85, 247, 0.5); }
  #retry:active { transform: scale(0.97); }

  /* Edge flowers (per-guess bloom) */
  .edge-flower {
    position: absolute;
    transform: scale(0) rotate(-90deg);
    animation: bloom 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    will-change: transform;
    filter: drop-shadow(0 2px 3px rgba(120, 60, 110, 0.18));
  }
  @keyframes bloom {
    0%   { transform: scale(0) rotate(-90deg); opacity: 0; }
    40%  { opacity: 1; }
    100% { transform: scale(1) rotate(var(--rot, 0deg)); opacity: 1; }
  }
  .edge-flower svg { width: 100%; height: 100%; display: block; }

  /* Win overlay */
  #win-overlay {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    display: none;
    overflow: hidden;
  }
  #win-overlay.active { display: block; }

  .win-flower {
    position: absolute;
    transform: scale(0);
    will-change: transform;
    filter: drop-shadow(0 4px 6px rgba(120, 60, 110, 0.25));
    animation:
      winGrow 0.7s var(--grow-delay, 0ms) cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
      winShrink 0.6s var(--retract-delay, 2000ms) cubic-bezier(0.5, 0, 0.75, 0) forwards;
  }
  .win-flower svg { width: 100%; height: 100%; display: block; }
  @keyframes winGrow {
    0%   { transform: scale(0) rotate(-90deg); }
    100% { transform: scale(1) rotate(var(--rot, 0deg)); }
  }
  @keyframes winShrink {
    0%   { transform: scale(1) rotate(var(--rot, 0deg)); }
    100% { transform: scale(0) rotate(calc(var(--rot, 0deg) + 90deg)); }
  }

  .win-message {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    color: #be185d;
    font-weight: 800;
    font-size: clamp(26px, 6.5vw, 58px);
    letter-spacing: 1.5px;
    line-height: 1.35;
    opacity: 0;
    transform: scale(0.85);
    transition: opacity 0.7s ease, transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-shadow:
      0 2px 0 rgba(255, 255, 255, 0.8),
      0 6px 24px rgba(255, 255, 255, 0.9);
    z-index: 11;
    pointer-events: none;
    padding: 0 16px;
  }
  .win-message.show { opacity: 1; transform: scale(1); }
  .win-message .line2 { color: #db2777; }

  .win-replay {
    position: absolute;
    left: 50%;
    bottom: 12%;
    transform: translateX(-50%) scale(0.9);
    padding: 12px 28px;
    background: linear-gradient(135deg, #ec4899, #a855f7);
    color: white;
    border: none;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(168, 85, 247, 0.4);
    pointer-events: auto;
    opacity: 0;
    transition: opacity 0.5s ease, transform 0.5s ease;
    z-index: 12;
    font-family: inherit;
  }
  .win-replay.show { opacity: 1; transform: translateX(-50%) scale(1); }
  .win-replay:hover { box-shadow: 0 10px 30px rgba(168, 85, 247, 0.55); }
  .win-replay:active { transform: translateX(-50%) scale(0.96); }

  @media (max-width: 480px) {
    .game { padding: 12px 10px; }
    h1 { font-size: 19px; }
    .key { height: 44px; font-size: 13px; }
    .key.wide { font-size: 10px; }
  }
  @media (max-height: 640px) {
    .key { height: 40px; }
    h1 { font-size: 18px; margin-bottom: 0; }
    .subtitle { margin-bottom: 6px; }
    #board { margin-bottom: 8px; }
  }
</style>
</head>
<body>
  <div class="flower-layer" id="flower-edge" aria-hidden="true"></div>

  <main class="game">
    <h1>A Mother&rsquo;s Day Wordle</h1>
    <p class="subtitle">Seven letters &middot; Six chances &middot; With love</p>
    <div id="message" aria-live="polite"></div>
    <div id="board"></div>
    <div id="keyboard"></div>
    <button id="retry" type="button">New Game</button>
  </main>

  <div id="win-overlay" aria-hidden="true"></div>

  <script>
  (function () {
    'use strict';

    const ANSWER = 'BELOVED';
    const MAX_GUESSES = 6;

    // ---------- SVG flower factories ----------
    const lilacSVG = () => `
      <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <path d="M30 58 Q27 42 30 22" stroke="#3f6d3f" stroke-width="2" fill="none" stroke-linecap="round"/>
        <ellipse cx="22" cy="40" rx="7" ry="3.2" fill="#558a55" transform="rotate(-30 22 40)"/>
        <ellipse cx="38" cy="44" rx="7" ry="3.2" fill="#558a55" transform="rotate(30 38 44)"/>
        <g>
          <circle cx="22" cy="22" r="3.6" fill="#a87cd6"/>
          <circle cx="30" cy="14" r="3.6" fill="#b884e0"/>
          <circle cx="38" cy="22" r="3.6" fill="#a87cd6"/>
          <circle cx="26" cy="29" r="3.6" fill="#b884e0"/>
          <circle cx="34" cy="29" r="3.6" fill="#9d6cc7"/>
          <circle cx="30" cy="22" r="3.2" fill="#c89be8"/>
          <circle cx="22" cy="22" r="1" fill="#fff8fb"/>
          <circle cx="30" cy="14" r="1" fill="#fff8fb"/>
          <circle cx="38" cy="22" r="1" fill="#fff8fb"/>
          <circle cx="26" cy="29" r="1" fill="#fff8fb"/>
          <circle cx="34" cy="29" r="1" fill="#fff8fb"/>
          <circle cx="30" cy="22" r="1" fill="#fff8fb"/>
        </g>
      </svg>`;

    const roseSVG = () => `
      <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <path d="M30 58 L30 38" stroke="#3f6d3f" stroke-width="2" stroke-linecap="round"/>
        <ellipse cx="20" cy="48" rx="6.5" ry="3.2" fill="#558a55" transform="rotate(-30 20 48)"/>
        <ellipse cx="40" cy="44" rx="6.5" ry="3.2" fill="#5c945c" transform="rotate(30 40 44)"/>
        <circle cx="30" cy="26" r="14" fill="#ffb3d1"/>
        <circle cx="30" cy="26" r="11" fill="#ff8fc1"/>
        <circle cx="30" cy="26" r="8"  fill="#ff6fa9"/>
        <circle cx="30" cy="26" r="5"  fill="#e64f8a"/>
        <path d="M27 26 Q30 22 33 26 Q30 30 27 26 Z" fill="#ffe0ee"/>
        <path d="M30 14 Q34 18 30 26 Q26 18 30 14 Z" fill="#ffd0e3" opacity="0.7"/>
      </svg>`;

    const wreathSVG = () => `
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="32" fill="none" stroke="#4a7a4a" stroke-width="7"/>
        <circle cx="50" cy="50" r="32" fill="none" stroke="#6aa66a" stroke-width="3" stroke-dasharray="3 6"/>
        <circle cx="50" cy="18" r="7" fill="#ff6fa9"/><circle cx="50" cy="18" r="3" fill="#ffe0ee"/>
        <circle cx="82" cy="50" r="7" fill="#a87cd6"/><circle cx="82" cy="50" r="3" fill="#e8d5f5"/>
        <circle cx="50" cy="82" r="7" fill="#ff6fa9"/><circle cx="50" cy="82" r="3" fill="#ffe0ee"/>
        <circle cx="18" cy="50" r="7" fill="#a87cd6"/><circle cx="18" cy="50" r="3" fill="#e8d5f5"/>
        <circle cx="73" cy="27" r="5" fill="#ff8fc1"/>
        <circle cx="73" cy="73" r="5" fill="#b884e0"/>
        <circle cx="27" cy="73" r="5" fill="#ff8fc1"/>
        <circle cx="27" cy="27" r="5" fill="#b884e0"/>
        <path d="M40 84 L50 100 L60 84 Z" fill="#ff6fa9" stroke="#e64f8a" stroke-width="1"/>
        <path d="M44 84 L50 92 L56 84 Z" fill="#ffb3d1"/>
      </svg>`;

    const garlandSVG = () => `
      <svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 15 Q100 78 195 15" stroke="#4a7a4a" stroke-width="5" fill="none" stroke-linecap="round"/>
        <ellipse cx="50" cy="42" rx="9" ry="4" fill="#558a55"/>
        <ellipse cx="100" cy="58" rx="9" ry="4" fill="#558a55"/>
        <ellipse cx="150" cy="42" rx="9" ry="4" fill="#558a55"/>
        <circle cx="35" cy="30" r="8" fill="#ff8fc1"/><circle cx="35" cy="30" r="3" fill="#ffe0ee"/>
        <circle cx="70" cy="50" r="8" fill="#a87cd6"/><circle cx="70" cy="50" r="3" fill="#e8d5f5"/>
        <circle cx="100" cy="60" r="9" fill="#ff6fa9"/><circle cx="100" cy="60" r="3" fill="#ffe0ee"/>
        <circle cx="130" cy="50" r="8" fill="#a87cd6"/><circle cx="130" cy="50" r="3" fill="#e8d5f5"/>
        <circle cx="165" cy="30" r="8" fill="#ff8fc1"/><circle cx="165" cy="30" r="3" fill="#ffe0ee"/>
      </svg>`;

    // ---------- DOM refs ----------
    const board       = document.getElementById('board');
    const keyboard    = document.getElementById('keyboard');
    const messageEl   = document.getElementById('message');
    const flowerLayer = document.getElementById('flower-edge');
    const winOverlay  = document.getElementById('win-overlay');
    const retryBtn    = document.getElementById('retry');

    // ---------- Game state ----------
    let currentRow = 0;
    let currentGuess = '';
    let gameOver = false;
    let isSubmitting = false;

    // ---------- Build UI ----------
    function buildBoard() {
      board.innerHTML = '';
      for (let r = 0; r < MAX_GUESSES; r++) {
        const row = document.createElement('div');
        row.className = 'row';
        row.id = `row-${r}`;
        for (let c = 0; c < ANSWER.length; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.id = `cell-${r}-${c}`;
          row.appendChild(cell);
        }
        board.appendChild(row);
      }
    }

    function buildKeyboard() {
      keyboard.innerHTML = '';
      const rows = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
      rows.forEach((rowStr, i) => {
        const rowEl = document.createElement('div');
        rowEl.className = 'kb-row';
        if (i === 2) rowEl.appendChild(makeKey('ENTER', 'wide'));
        for (const ch of rowStr) rowEl.appendChild(makeKey(ch));
        if (i === 2) rowEl.appendChild(makeKey('BACK', 'wide'));
        keyboard.appendChild(rowEl);
      });
    }

    function makeKey(label, extra) {
      const k = document.createElement('button');
      k.type = 'button';
      k.className = ('key ' + (extra || '')).trim();
      k.dataset.key = label;
      k.textContent = label === 'BACK' ? '⌫' : label;
      k.addEventListener('click', (e) => { e.preventDefault(); k.blur(); handleKey(label); });
      return k;
    }

    // ---------- Input ----------
    function handleKey(key) {
      if (gameOver || isSubmitting) return;
      if (key === 'ENTER') return submitGuess();
      if (key === 'BACK') {
        if (currentGuess.length > 0) {
          currentGuess = currentGuess.slice(0, -1);
          updateRow();
        }
        return;
      }
      if (/^[A-Z]$/.test(key) && currentGuess.length < ANSWER.length) {
        currentGuess += key;
        updateRow();
      }
    }

    function updateRow() {
      for (let c = 0; c < ANSWER.length; c++) {
        const cell = document.getElementById(`cell-${currentRow}-${c}`);
        const ch = currentGuess[c] || '';
        const had = cell.textContent;
        cell.textContent = ch;
        if (ch && !had) cell.classList.add('filled');
        if (!ch) cell.classList.remove('filled');
      }
    }

    function showMessage(msg, ms) {
      ms = ms || 1400;
      messageEl.textContent = msg;
      clearTimeout(messageEl._t);
      messageEl._t = setTimeout(() => { messageEl.textContent = ''; }, ms);
    }

    function shakeRow(r) {
      const row = document.getElementById(`row-${r}`);
      row.classList.remove('shake');
      void row.offsetWidth;
      row.classList.add('shake');
      setTimeout(() => row.classList.remove('shake'), 500);
    }

    // ---------- Wordle scoring (with proper duplicate handling) ----------
    function scoreGuess(guess, answer) {
      const result = new Array(answer.length).fill('absent');
      const rem = answer.split('');
      for (let i = 0; i < guess.length; i++) {
        if (guess[i] === rem[i]) {
          result[i] = 'correct';
          rem[i] = null;
        }
      }
      for (let i = 0; i < guess.length; i++) {
        if (result[i] === 'correct') continue;
        const idx = rem.indexOf(guess[i]);
        if (idx >= 0) {
          result[i] = 'present';
          rem[idx] = null;
        }
      }
      return result;
    }

    // ---------- Submit ----------
    function submitGuess() {
      if (currentGuess.length !== ANSWER.length) {
        shakeRow(currentRow);
        showMessage('Need ' + ANSWER.length + ' letters');
        return;
      }
      isSubmitting = true;
      const result = scoreGuess(currentGuess, ANSWER);
      const flipDur = 500;
      const flipStagger = 240;

      for (let c = 0; c < ANSWER.length; c++) {
        const cell = document.getElementById(`cell-${currentRow}-${c}`);
        const status = result[c];
        ((cell, status, c) => {
          setTimeout(() => {
            cell.classList.add('flip');
            setTimeout(() => { cell.classList.add(status); }, flipDur / 2);
          }, c * flipStagger);
        })(cell, status, c);
      }

      const order = { absent: 0, present: 1, correct: 2 };
      for (let c = 0; c < ANSWER.length; c++) {
        const ch = currentGuess[c];
        const k = document.querySelector(`.key[data-key="${ch}"]`);
        if (!k) continue;
        const cur = k.dataset.status;
        if (!cur || order[result[c]] > order[cur]) {
          ((k, status, c) => {
            setTimeout(() => {
              k.classList.remove('absent', 'present', 'correct');
              k.classList.add(status);
              k.dataset.status = status;
            }, c * flipStagger + flipDur / 2);
          })(k, result[c], c);
        }
      }

      growEdgeFlowers();

      const totalDur = (ANSWER.length - 1) * flipStagger + flipDur + 200;
      const won = currentGuess === ANSWER;
      const submittedRow = currentRow;

      setTimeout(() => {
        isSubmitting = false;
        if (won) {
          gameOver = true;
          const row = document.getElementById('row-' + submittedRow);
          row.classList.add('win-bounce');
          setTimeout(triggerWin, 700);
        } else {
          currentRow++;
          currentGuess = '';
          if (currentRow >= MAX_GUESSES) {
            gameOver = true;
            showMessage('The word was ' + ANSWER, 8000);
          }
        }
      }, totalDur);
    }

    // ---------- Edge flowers (per-guess) ----------
    function growEdgeFlowers() {
      const w = window.innerWidth, h = window.innerHeight;
      const isSmall = Math.min(w, h) < 600;
      const count = isSmall ? 7 : 11;
      for (let i = 0; i < count; i++) {
        const f = document.createElement('div');
        f.className = 'edge-flower';
        const useLilac = Math.random() < 0.55;
        f.innerHTML = useLilac ? lilacSVG() : roseSVG();

        const side = Math.floor(Math.random() * 4);
        const along = Math.random();
        const depthBand = isSmall ? 0.10 : 0.14;
        const depth = Math.random() * depthBand;
        let x, y;
        if (side === 0)      { x = along * w; y = depth * h; }
        else if (side === 1) { x = (1 - depth) * w; y = along * h; }
        else if (side === 2) { x = along * w; y = (1 - depth) * h; }
        else                 { x = depth * w; y = along * h; }

        const size = (isSmall ? 38 : 56) + Math.random() * (isSmall ? 26 : 40);
        f.style.left = (x - size / 2) + 'px';
        f.style.top  = (y - size / 2) + 'px';
        f.style.width  = size + 'px';
        f.style.height = size + 'px';
        const rot = (Math.random() * 60 - 30) + 'deg';
        f.style.setProperty('--rot', rot);
        f.style.animationDelay = (Math.random() * 0.5) + 's';
        flowerLayer.appendChild(f);
      }
    }

    // ---------- Win sequence ----------
    function triggerWin() {
      winOverlay.innerHTML = '';
      winOverlay.classList.add('active');

      const w = window.innerWidth, h = window.innerHeight;
      const isSmall = Math.min(w, h) < 600;
      const cellSize = isSmall ? 70 : 96;
      const cols = Math.ceil(w / cellSize) + 1;
      const rows = Math.ceil(h / cellSize) + 1;
      const cx = w / 2, cy = h / 2;
      const maxDist = Math.hypot(w / 2, h / 2);

      const GROW_MAX = 700;     // ms spread for grow-in
      const HOLD = 700;         // ms held at full coverage
      const GROW_ANIM = 700;    // matches CSS winGrow duration
      const RETRACT_SPREAD = 700;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const f = document.createElement('div');
          f.className = 'win-flower';
          const t = Math.random();
          let svg;
          if      (t < 0.32) svg = lilacSVG();
          else if (t < 0.62) svg = roseSVG();
          else if (t < 0.84) svg = wreathSVG();
          else               svg = garlandSVG();
          f.innerHTML = svg;

          const jitter = cellSize * 0.55;
          const x = c * cellSize + (Math.random() - 0.5) * jitter;
          const y = r * cellSize + (Math.random() - 0.5) * jitter;
          const size = cellSize * (0.95 + Math.random() * 0.55);
          f.style.left = (x - size / 2) + 'px';
          f.style.top  = (y - size / 2) + 'px';
          f.style.width  = size + 'px';
          f.style.height = size + 'px';

          const dist = Math.hypot(x - cx, y - cy);
          const tn = Math.min(1, dist / maxDist); // 0=center, 1=edge
          // Grow: edges first, center last
          const growDelay = (1 - tn) * GROW_MAX + Math.random() * 150;
          // Retract: center first, edges last
          const retractStart = GROW_MAX + GROW_ANIM + HOLD; // ~2100ms
          const retractDelay = retractStart + tn * RETRACT_SPREAD + Math.random() * 150;

          const rot = (Math.random() * 80 - 40) + 'deg';
          f.style.setProperty('--rot', rot);
          f.style.setProperty('--grow-delay', growDelay + 'ms');
          f.style.setProperty('--retract-delay', retractDelay + 'ms');

          winOverlay.appendChild(f);
        }
      }

      const msg = document.createElement('div');
      msg.className = 'win-message';
      msg.innerHTML =
        '<div class="line1">HAPPY MOTHER&rsquo;S DAY</div>' +
        '<div class="line2">&#10084;&#65039; WE LOVE YOU &#10084;&#65039;</div>';
      winOverlay.appendChild(msg);

      const replay = document.createElement('button');
      replay.type = 'button';
      replay.className = 'win-replay';
      replay.textContent = 'Play Again';
      replay.addEventListener('click', () => reset());
      winOverlay.appendChild(replay);

      // Reveal message just as the retraction begins, so the message
      // becomes visible *as* the flowers pull back to reveal it.
      const retractStart = GROW_MAX + GROW_ANIM + HOLD; // ~2100ms
      setTimeout(() => msg.classList.add('show'), retractStart + 100);
      setTimeout(() => replay.classList.add('show'), retractStart + 800);
    }

    // ---------- Reset ----------
    function reset() {
      currentRow = 0;
      currentGuess = '';
      gameOver = false;
      isSubmitting = false;
      flowerLayer.innerHTML = '';
      winOverlay.classList.remove('active');
      winOverlay.innerHTML = '';
      messageEl.textContent = '';
      buildBoard();
      buildKeyboard();
    }

    retryBtn.addEventListener('click', () => { retryBtn.blur(); reset(); });

    document.addEventListener('keydown', (e) => {
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      if (e.key === 'Enter')      { e.preventDefault(); return handleKey('ENTER'); }
      if (e.key === 'Backspace')  { e.preventDefault(); return handleKey('BACK'); }
      const k = (e.key || '').toUpperCase();
      if (/^[A-Z]$/.test(k)) handleKey(k);
    });

    reset();
  })();
  </script>
</body>
</html>
