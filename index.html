<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#fff5fa" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#160814" media="(prefers-color-scheme: dark)">
<title>A Mother&rsquo;s Day Wordle</title>
<style>
  :root {
    --bg-radial-1: #fce7f3;
    --bg-radial-2: #ede9fe;
    --bg-grad-1: #fff5fa;
    --bg-grad-2: #fdf2f8;
    --bg-card: rgba(255, 255, 255, 0.78);
    --text: #2a2a2a;
    --title: #be185d;
    --title-2: #db2777;
    --subtitle: #a78aaa;
    --cell-border: #d3d6da;
    --cell-border-filled: #878a8c;
    --cell-bg: #ffffff;
    --cell-text: #1a1a1b;
    --key-bg: #d3d6da;
    --key-bg-hover: #c0c4c8;
    --key-text: #1a1a1b;
    --correct: #6aaa64;
    --present: #c9b458;
    --absent: #787c7e;
    --tile-text: #ffffff;
    --accent-grad-1: #ec4899;
    --accent-grad-2: #a855f7;
    --shadow: rgba(190, 100, 160, 0.18);
    --modal-overlay: rgba(40, 10, 50, 0.45);
    --modal-bg: rgba(255, 255, 255, 0.96);
    --bar-bg: #e7d6f0;
    --icon-hover: rgba(190, 24, 93, 0.10);
  }

  :root[data-theme="dark"] {
    --bg-radial-1: #2a1430;
    --bg-radial-2: #1d1429;
    --bg-grad-1: #160814;
    --bg-grad-2: #1f0e1f;
    --bg-card: rgba(40, 25, 50, 0.78);
    --text: #f5e8ee;
    --title: #f9a8d4;
    --title-2: #fbc6e0;
    --subtitle: #c5a3c0;
    --cell-border: #3a2a45;
    --cell-border-filled: #6c5475;
    --cell-bg: rgba(255, 255, 255, 0.04);
    --cell-text: #f5e8ee;
    --key-bg: #3a2a48;
    --key-bg-hover: #4a3a58;
    --key-text: #f5e8ee;
    --correct: #538d4e;
    --present: #b59f3b;
    --absent: #3a3a3c;
    --tile-text: #ffffff;
    --shadow: rgba(0, 0, 0, 0.55);
    --modal-overlay: rgba(0, 0, 0, 0.6);
    --modal-bg: rgba(40, 25, 55, 0.96);
    --bar-bg: #3a2a48;
    --icon-hover: rgba(249, 168, 212, 0.15);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
  }
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background:
      radial-gradient(ellipse at 20% 0%, var(--bg-radial-1) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, var(--bg-radial-2) 0%, transparent 60%),
      linear-gradient(180deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding:
      max(16px, env(safe-area-inset-top))
      max(16px, env(safe-area-inset-right))
      max(16px, env(safe-area-inset-bottom))
      max(16px, env(safe-area-inset-left));
    color: var(--text);
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
    transition: background 0.3s ease, color 0.3s ease;
  }

  .flower-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .game {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 460px;
    background: var(--bg-card);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 18px;
    padding: 18px 16px 14px;
    box-shadow: 0 10px 40px var(--shadow);
    text-align: center;
    transition: background 0.3s ease, box-shadow 0.3s ease;
  }

  .header-icons {
    position: absolute;
    top: 10px;
    right: 12px;
    display: flex;
    gap: 4px;
    z-index: 5;
  }
  .icon-btn {
    width: 34px;
    height: 34px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    color: var(--title);
    cursor: pointer;
    padding: 0;
    border-radius: 50%;
    touch-action: manipulation;
    transition: background 0.12s, transform 0.05s;
    font-family: inherit;
  }
  .icon-btn:hover { background: var(--icon-hover); }
  .icon-btn:active { transform: scale(0.92); }
  .icon-btn svg { display: block; }
  :root[data-theme="dark"] .icon-sun  { display: block; }
  :root[data-theme="dark"] .icon-moon { display: none; }
  :root:not([data-theme="dark"]) .icon-sun  { display: none; }
  :root:not([data-theme="dark"]) .icon-moon { display: block; }

  h1 {
    margin: 0 0 2px;
    font-size: 22px;
    letter-spacing: 0.5px;
    color: var(--title);
    font-weight: 800;
  }
  .subtitle {
    margin: 0 0 10px;
    font-size: 11px;
    color: var(--subtitle);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  #message {
    height: 20px;
    font-size: 13px;
    color: var(--title);
    margin-bottom: 6px;
    font-weight: 600;
  }

  #board {
    display: grid;
    grid-template-rows: repeat(6, 1fr);
    gap: 5px;
    margin: 0 auto 12px;
    width: 100%;
    max-width: 360px;
  }
  .row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
  }
  .cell {
    aspect-ratio: 1 / 1;
    border: 2px solid var(--cell-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(16px, 5.5vw, 26px);
    font-weight: 700;
    text-transform: uppercase;
    background: var(--cell-bg);
    color: var(--cell-text);
    transition: border-color 0.12s, transform 0.1s, background 0.3s ease;
  }
  .cell.filled {
    border-color: var(--cell-border-filled);
    animation: pop 0.12s ease;
  }
  @keyframes pop {
    50% { transform: scale(1.08); }
  }
  .cell.flip {
    animation: flip 0.5s ease forwards;
  }
  @keyframes flip {
    0%   { transform: rotateX(0); }
    50%  { transform: rotateX(90deg); }
    100% { transform: rotateX(0); }
  }
  .cell.correct { background: var(--correct); border-color: var(--correct); color: var(--tile-text); }
  .cell.present { background: var(--present); border-color: var(--present); color: var(--tile-text); }
  .cell.absent  { background: var(--absent);  border-color: var(--absent);  color: var(--tile-text); }

  .row.shake { animation: shake 0.5s; }
  @keyframes shake {
    10%, 90% { transform: translateX(-1px); }
    20%, 80% { transform: translateX(2px); }
    30%, 50%, 70% { transform: translateX(-5px); }
    40%, 60% { transform: translateX(5px); }
  }

  .row.win-bounce .cell { animation: bounce 0.6s ease; }
  .row.win-bounce .cell:nth-child(1) { animation-delay: 0.00s; }
  .row.win-bounce .cell:nth-child(2) { animation-delay: 0.08s; }
  .row.win-bounce .cell:nth-child(3) { animation-delay: 0.16s; }
  .row.win-bounce .cell:nth-child(4) { animation-delay: 0.24s; }
  .row.win-bounce .cell:nth-child(5) { animation-delay: 0.32s; }
  .row.win-bounce .cell:nth-child(6) { animation-delay: 0.40s; }
  .row.win-bounce .cell:nth-child(7) { animation-delay: 0.48s; }
  @keyframes bounce {
    0%, 20%   { transform: translateY(0); }
    40%       { transform: translateY(-22px); }
    50%       { transform: translateY(4px); }
    60%       { transform: translateY(-8px); }
    80%, 100% { transform: translateY(0); }
  }

  #keyboard {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 8px;
  }
  .kb-row {
    display: flex;
    justify-content: center;
    gap: 4px;
  }
  .key {
    flex: 1;
    min-width: 0;
    height: 48px;
    padding: 0 4px;
    border: none;
    border-radius: 5px;
    background: var(--key-bg);
    color: var(--key-text);
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.12s, transform 0.05s;
    font-family: inherit;
    touch-action: manipulation;
  }
  .key.wide { flex: 1.5; font-size: 11px; }
  .key:hover { background: var(--key-bg-hover); }
  .key:active { transform: scale(0.96); }
  .key.correct { background: var(--correct); color: var(--tile-text); }
  .key.present { background: var(--present); color: var(--tile-text); }
  .key.absent  { background: var(--absent);  color: var(--tile-text); }

  #retry {
    background: linear-gradient(135deg, var(--accent-grad-1), var(--accent-grad-2));
    color: white;
    border: none;
    border-radius: 999px;
    padding: 10px 22px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.15s;
    box-shadow: 0 4px 14px rgba(168, 85, 247, 0.35);
    font-family: inherit;
    touch-action: manipulation;
  }
  #retry:hover { box-shadow: 0 6px 20px rgba(168, 85, 247, 0.5); }
  #retry:active { transform: scale(0.97); }

  /* Edge flowers (per-guess bloom) */
  .edge-flower {
    position: absolute;
    transform: scale(0) rotate(-90deg);
    animation: bloom 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    will-change: transform;
    filter: drop-shadow(0 2px 3px rgba(120, 60, 110, 0.18));
  }
  @keyframes bloom {
    0%   { transform: scale(0) rotate(-90deg); opacity: 0; }
    40%  { opacity: 1; }
    100% { transform: scale(1) rotate(var(--rot, 0deg)); opacity: 1; }
  }
  .edge-flower svg { width: 100%; height: 100%; display: block; }

  /* Win overlay */
  #win-overlay {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    display: none;
    overflow: hidden;
  }
  #win-overlay.active { display: block; }

  .win-flower {
    position: absolute;
    transform: scale(0);
    will-change: transform;
    filter: drop-shadow(0 4px 6px rgba(120, 60, 110, 0.25));
    animation:
      winGrow 0.7s var(--grow-delay, 0ms) cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
      winShrink 0.6s var(--retract-delay, 2000ms) cubic-bezier(0.5, 0, 0.75, 0) forwards;
  }
  .win-flower svg { width: 100%; height: 100%; display: block; }
  @keyframes winGrow {
    0%   { transform: scale(0) rotate(-90deg); }
    100% { transform: scale(1) rotate(var(--rot, 0deg)); }
  }
  @keyframes winShrink {
    0%   { transform: scale(1) rotate(var(--rot, 0deg)); }
    100% { transform: scale(0) rotate(calc(var(--rot, 0deg) + 90deg)); }
  }

  .win-message {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    color: var(--title);
    font-weight: 800;
    font-size: clamp(26px, 6.5vw, 58px);
    letter-spacing: 1.5px;
    line-height: 1.35;
    opacity: 0;
    transform: scale(0.85);
    transition: opacity 0.7s ease, transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-shadow:
      0 2px 0 rgba(255, 255, 255, 0.8),
      0 6px 24px rgba(255, 255, 255, 0.9);
    z-index: 11;
    pointer-events: none;
    padding: 0 16px;
  }
  .win-message.show { opacity: 1; transform: scale(1); }
  .win-message .line2 { color: var(--title-2); }

  .win-actions {
    position: absolute;
    left: 50%;
    bottom: max(12%, env(safe-area-inset-bottom));
    transform: translateX(-50%) scale(0.9);
    display: flex;
    gap: 10px;
    opacity: 0;
    transition: opacity 0.5s ease, transform 0.5s ease;
    z-index: 12;
    pointer-events: auto;
  }
  .win-actions.show { opacity: 1; transform: translateX(-50%) scale(1); }
  .win-btn {
    padding: 12px 24px;
    background: linear-gradient(135deg, var(--accent-grad-1), var(--accent-grad-2));
    color: white;
    border: none;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(168, 85, 247, 0.4);
    font-family: inherit;
    touch-action: manipulation;
    transition: transform 0.1s, box-shadow 0.15s;
  }
  .win-btn:hover { box-shadow: 0 10px 30px rgba(168, 85, 247, 0.55); }
  .win-btn:active { transform: scale(0.96); }

  /* Modal (stats) */
  .modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: none;
  }
  .modal.active { display: block; }
  .modal-backdrop {
    position: absolute;
    inset: 0;
    background: var(--modal-overlay);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .modal-card {
    position: relative;
    margin: max(20px, env(safe-area-inset-top)) auto max(20px, env(safe-area-inset-bottom));
    max-width: 400px;
    width: calc(100% - 32px);
    max-height: calc(100dvh - 40px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
    overflow-y: auto;
    background: var(--modal-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--text);
    border-radius: 16px;
    padding: 28px 22px 22px;
    box-shadow: 0 20px 60px var(--shadow);
  }
  .modal-close {
    position: absolute;
    top: 8px;
    right: 8px;
    background: transparent;
    border: none;
    cursor: pointer;
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    opacity: 0.6;
    border-radius: 50%;
    touch-action: manipulation;
  }
  .modal-close:hover { opacity: 1; background: var(--icon-hover); }
  .modal h2 {
    margin: 0 0 16px;
    text-align: center;
    font-size: 18px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--title);
    font-weight: 800;
  }
  .modal h3 {
    margin: 18px 0 10px;
    text-align: center;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0.75;
    font-weight: 700;
  }
  .stats-numbers {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
  }
  .stat { text-align: center; padding: 4px 2px; }
  .stat-num { font-size: 26px; font-weight: 800; color: var(--text); line-height: 1.1; }
  .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.4px; opacity: 0.7; margin-top: 4px; line-height: 1.2; }

  #distribution {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 18px;
  }
  .dist-row {
    display: grid;
    grid-template-columns: 16px 1fr;
    gap: 8px;
    align-items: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }
  .dist-bar {
    background: var(--bar-bg);
    height: 22px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 8px;
    color: var(--text);
    min-width: 24px;
    font-size: 12px;
    transition: width 0.5s ease, background 0.3s ease;
  }
  .dist-bar.highlight {
    background: var(--correct);
    color: var(--tile-text);
  }
  .share-btn {
    display: block;
    margin: 4px auto 0;
    padding: 12px 32px;
    background: linear-gradient(135deg, var(--accent-grad-1), var(--accent-grad-2));
    color: white;
    border: none;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 6px 18px rgba(168, 85, 247, 0.35);
    transition: transform 0.1s, box-shadow 0.15s, opacity 0.15s;
    touch-action: manipulation;
  }
  .share-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
  .share-btn:not(:disabled):hover { box-shadow: 0 8px 24px rgba(168, 85, 247, 0.5); }
  .share-btn:not(:disabled):active { transform: scale(0.97); }

  @media (max-width: 480px) {
    .game { padding: 12px 10px; }
    h1 { font-size: 19px; }
    .key { height: 44px; font-size: 13px; }
    .key.wide { font-size: 10px; }
  }
  @media (max-width: 380px) {
    .game { padding: 10px 8px; }
    h1 { font-size: 17px; }
    .key { height: 40px; font-size: 12px; min-width: 0; padding: 0 2px; }
    .key.wide { font-size: 9px; flex: 1.3; }
    #board { gap: 4px; }
    .row { gap: 4px; }
    .stat-num { font-size: 22px; }
  }
  @media (max-height: 640px) {
    .key { height: 40px; }
    h1 { font-size: 18px; margin-bottom: 0; }
    .subtitle { margin-bottom: 6px; }
    #board { margin-bottom: 8px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
  }
</style>
</head>
<body>
  <div class="flower-layer" id="flower-edge" aria-hidden="true"></div>

  <main class="game">
    <div class="header-icons">
      <button id="theme-toggle" type="button" class="icon-btn" aria-label="Toggle theme">
        <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun"  viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
      <button id="stats-btn" type="button" class="icon-btn" aria-label="Statistics">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="12" width="4" height="8" rx="1"/><rect x="10" y="6" width="4" height="14" rx="1"/><rect x="16" y="9" width="4" height="11" rx="1"/></svg>
      </button>
    </div>
    <h1>A Mother&rsquo;s Day Wordle</h1>
    <p class="subtitle">Seven letters &middot; Six chances &middot; With love</p>
    <div id="message" aria-live="polite"></div>
    <div id="board"></div>
    <div id="keyboard"></div>
    <button id="retry" type="button">New Game</button>
  </main>

  <div id="win-overlay" aria-hidden="true"></div>

  <div id="stats-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" id="stats-backdrop"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="stats-title">
      <button id="stats-close" type="button" class="modal-close" aria-label="Close statistics">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
      <h2 id="stats-title">Statistics</h2>
      <div class="stats-numbers">
        <div class="stat"><div class="stat-num" id="stat-played">0</div><div class="stat-label">Played</div></div>
        <div class="stat"><div class="stat-num" id="stat-winpct">0</div><div class="stat-label">Win&nbsp;%</div></div>
        <div class="stat"><div class="stat-num" id="stat-cur">0</div><div class="stat-label">Current Streak</div></div>
        <div class="stat"><div class="stat-num" id="stat-max">0</div><div class="stat-label">Max Streak</div></div>
      </div>
      <h3>Guess Distribution</h3>
      <div id="distribution"></div>
      <button id="share-btn" type="button" class="share-btn" disabled>Share</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    // ---------- Word bank (20 love-themed 7-letter answers) ----------
    const WORD_BANK = [
      'BELOVED', 'CHERISH', 'EMBRACE', 'ROMANCE', 'DEAREST',
      'HUGGING', 'KISSING', 'DEVOTED', 'LOVABLE', 'NURTURE',
      'DELIGHT', 'RAPTURE', 'SMITTEN', 'DARLING', 'RADIANT',
      'CHARMED', 'BLESSED', 'GLOWING', 'FOREVER', 'ETERNAL'
    ];

    // ---------- Storage (degrades to in-memory if localStorage throws) ----------
    const KEY = {
      attempted: 'motherDay2026:attempted',
      current:   'motherDay2026:current',
      stats:     'motherDay2026:stats',
      theme:     'motherDay2026:theme'
    };
    function readStorage(k)  { try { return localStorage.getItem(k); } catch (_) { return null; } }
    function writeStorage(k, v) { try { localStorage.setItem(k, v); } catch (_) {} }
    function removeStorage(k) { try { localStorage.removeItem(k); } catch (_) {} }
    function readJSON(k, fallback) {
      const raw = readStorage(k);
      if (raw == null) return fallback;
      try { return JSON.parse(raw); } catch (_) { return fallback; }
    }

    function loadAttempted() {
      const arr = readJSON(KEY.attempted, []);
      if (!Array.isArray(arr)) return [];
      return arr.filter(w => WORD_BANK.indexOf(w) !== -1);
    }
    function saveAttempted(arr) { writeStorage(KEY.attempted, JSON.stringify(arr)); }
    function loadCurrent() {
      const w = readStorage(KEY.current);
      return (w && WORD_BANK.indexOf(w) !== -1) ? w : null;
    }
    function saveCurrent(w) { writeStorage(KEY.current, w); }
    function clearCurrent() { removeStorage(KEY.current); }
    function markAttempted(w) {
      let arr = loadAttempted();
      if (arr.indexOf(w) === -1) arr.push(w);
      if (arr.length >= WORD_BANK.length) arr = []; // cycle complete -> reshuffle
      saveAttempted(arr);
    }
    function pickAnswer() {
      const cur = loadCurrent();
      if (cur) return cur;
      const attempted = loadAttempted();
      let pool = WORD_BANK.filter(w => attempted.indexOf(w) === -1);
      if (pool.length === 0) pool = WORD_BANK.slice();
      const w = pool[Math.floor(Math.random() * pool.length)];
      saveCurrent(w);
      return w;
    }

    // ---------- Stats ----------
    function defaultStats() {
      return { played: 0, won: 0, currentStreak: 0, maxStreak: 0, distribution: [0,0,0,0,0,0], lastWinRow: -1 };
    }
    function loadStats() {
      const s = readJSON(KEY.stats, null);
      if (!s || typeof s !== 'object') return defaultStats();
      const out = defaultStats();
      ['played','won','currentStreak','maxStreak','lastWinRow'].forEach(k => {
        if (typeof s[k] === 'number') out[k] = s[k];
      });
      if (Array.isArray(s.distribution) && s.distribution.length === 6) {
        out.distribution = s.distribution.map(n => typeof n === 'number' ? n : 0);
      }
      return out;
    }
    function saveStats(s) { writeStorage(KEY.stats, JSON.stringify(s)); }
    function recordWin(rowIndex) {
      const s = loadStats();
      s.played++; s.won++; s.currentStreak++;
      if (s.currentStreak > s.maxStreak) s.maxStreak = s.currentStreak;
      s.distribution[rowIndex]++;
      s.lastWinRow = rowIndex;
      saveStats(s);
      return s;
    }
    function recordLoss() {
      const s = loadStats();
      s.played++; s.currentStreak = 0; s.lastWinRow = -1;
      saveStats(s);
      return s;
    }

    // ---------- Theme ----------
    function loadTheme() {
      const t = readStorage(KEY.theme);
      if (t === 'light' || t === 'dark') return t;
      return matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    function applyTheme(t) {
      document.documentElement.dataset.theme = t;
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.setAttribute('aria-label', t === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    }
    function setTheme(t) { writeStorage(KEY.theme, t); applyTheme(t); }
    applyTheme(loadTheme());

    // ---------- Share ----------
    let lastShareText = null;
    function buildShareText(rows, won, gameNumber) {
      const map = { correct: '🟩', present: '🟨', absent: '⬜' };
      const grid = rows.map(r => r.map(s => map[s] || '⬜').join('')).join('\n');
      const score = won ? rows.length : 'X';
      return 'A Mother’s Day Wordle #' + gameNumber + '\n' + score + '/' + MAX_GUESSES + '\n\n' + grid;
    }
    async function share() {
      if (!lastShareText) return;
      try {
        if (navigator.share) {
          await navigator.share({ text: lastShareText });
          return;
        }
      } catch (_) { /* user cancelled - try clipboard */ }
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(lastShareText);
          showMessage('Copied!');
          return;
        }
      } catch (_) { /* fall through */ }
      const ta = document.createElement('textarea');
      ta.value = lastShareText;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      ta.setAttribute('readonly', '');
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); showMessage('Copied!'); } catch (_) {}
      document.body.removeChild(ta);
    }

    // ---------- SVG flower factories ----------
    const lilacSVG = () => `
      <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <path d="M30 58 Q27 42 30 22" stroke="#3f6d3f" stroke-width="2" fill="none" stroke-linecap="round"/>
        <ellipse cx="22" cy="40" rx="7" ry="3.2" fill="#558a55" transform="rotate(-30 22 40)"/>
        <ellipse cx="38" cy="44" rx="7" ry="3.2" fill="#558a55" transform="rotate(30 38 44)"/>
        <g>
          <circle cx="22" cy="22" r="3.6" fill="#a87cd6"/>
          <circle cx="30" cy="14" r="3.6" fill="#b884e0"/>
          <circle cx="38" cy="22" r="3.6" fill="#a87cd6"/>
          <circle cx="26" cy="29" r="3.6" fill="#b884e0"/>
          <circle cx="34" cy="29" r="3.6" fill="#9d6cc7"/>
          <circle cx="30" cy="22" r="3.2" fill="#c89be8"/>
          <circle cx="22" cy="22" r="1" fill="#fff8fb"/>
          <circle cx="30" cy="14" r="1" fill="#fff8fb"/>
          <circle cx="38" cy="22" r="1" fill="#fff8fb"/>
          <circle cx="26" cy="29" r="1" fill="#fff8fb"/>
          <circle cx="34" cy="29" r="1" fill="#fff8fb"/>
          <circle cx="30" cy="22" r="1" fill="#fff8fb"/>
        </g>
      </svg>`;

    const roseSVG = () => `
      <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <path d="M30 58 L30 38" stroke="#3f6d3f" stroke-width="2" stroke-linecap="round"/>
        <ellipse cx="20" cy="48" rx="6.5" ry="3.2" fill="#558a55" transform="rotate(-30 20 48)"/>
        <ellipse cx="40" cy="44" rx="6.5" ry="3.2" fill="#5c945c" transform="rotate(30 40 44)"/>
        <circle cx="30" cy="26" r="14" fill="#ffb3d1"/>
        <circle cx="30" cy="26" r="11" fill="#ff8fc1"/>
        <circle cx="30" cy="26" r="8"  fill="#ff6fa9"/>
        <circle cx="30" cy="26" r="5"  fill="#e64f8a"/>
        <path d="M27 26 Q30 22 33 26 Q30 30 27 26 Z" fill="#ffe0ee"/>
        <path d="M30 14 Q34 18 30 26 Q26 18 30 14 Z" fill="#ffd0e3" opacity="0.7"/>
      </svg>`;

    const wreathSVG = () => `
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="32" fill="none" stroke="#4a7a4a" stroke-width="7"/>
        <circle cx="50" cy="50" r="32" fill="none" stroke="#6aa66a" stroke-width="3" stroke-dasharray="3 6"/>
        <circle cx="50" cy="18" r="7" fill="#ff6fa9"/><circle cx="50" cy="18" r="3" fill="#ffe0ee"/>
        <circle cx="82" cy="50" r="7" fill="#a87cd6"/><circle cx="82" cy="50" r="3" fill="#e8d5f5"/>
        <circle cx="50" cy="82" r="7" fill="#ff6fa9"/><circle cx="50" cy="82" r="3" fill="#ffe0ee"/>
        <circle cx="18" cy="50" r="7" fill="#a87cd6"/><circle cx="18" cy="50" r="3" fill="#e8d5f5"/>
        <circle cx="73" cy="27" r="5" fill="#ff8fc1"/>
        <circle cx="73" cy="73" r="5" fill="#b884e0"/>
        <circle cx="27" cy="73" r="5" fill="#ff8fc1"/>
        <circle cx="27" cy="27" r="5" fill="#b884e0"/>
        <path d="M40 84 L50 100 L60 84 Z" fill="#ff6fa9" stroke="#e64f8a" stroke-width="1"/>
        <path d="M44 84 L50 92 L56 84 Z" fill="#ffb3d1"/>
      </svg>`;

    const garlandSVG = () => `
      <svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 15 Q100 78 195 15" stroke="#4a7a4a" stroke-width="5" fill="none" stroke-linecap="round"/>
        <ellipse cx="50" cy="42" rx="9" ry="4" fill="#558a55"/>
        <ellipse cx="100" cy="58" rx="9" ry="4" fill="#558a55"/>
        <ellipse cx="150" cy="42" rx="9" ry="4" fill="#558a55"/>
        <circle cx="35" cy="30" r="8" fill="#ff8fc1"/><circle cx="35" cy="30" r="3" fill="#ffe0ee"/>
        <circle cx="70" cy="50" r="8" fill="#a87cd6"/><circle cx="70" cy="50" r="3" fill="#e8d5f5"/>
        <circle cx="100" cy="60" r="9" fill="#ff6fa9"/><circle cx="100" cy="60" r="3" fill="#ffe0ee"/>
        <circle cx="130" cy="50" r="8" fill="#a87cd6"/><circle cx="130" cy="50" r="3" fill="#e8d5f5"/>
        <circle cx="165" cy="30" r="8" fill="#ff8fc1"/><circle cx="165" cy="30" r="3" fill="#ffe0ee"/>
      </svg>`;

    // ---------- DOM refs ----------
    const board       = document.getElementById('board');
    const keyboard    = document.getElementById('keyboard');
    const messageEl   = document.getElementById('message');
    const flowerLayer = document.getElementById('flower-edge');
    const winOverlay  = document.getElementById('win-overlay');
    const retryBtn    = document.getElementById('retry');
    const themeBtn    = document.getElementById('theme-toggle');
    const statsBtn    = document.getElementById('stats-btn');
    const statsModal  = document.getElementById('stats-modal');
    const statsClose  = document.getElementById('stats-close');
    const statsBack   = document.getElementById('stats-backdrop');
    const shareBtn    = document.getElementById('share-btn');

    // ---------- Game state ----------
    let currentRow = 0;
    let currentGuess = '';
    let gameOver = false;
    let isSubmitting = false;
    let ANSWER = pickAnswer();
    const submittedRows = []; // each entry is an array of 'correct'|'present'|'absent'

    // ---------- Build UI ----------
    function buildBoard() {
      board.innerHTML = '';
      for (let r = 0; r < MAX_GUESSES; r++) {
        const row = document.createElement('div');
        row.className = 'row';
        row.id = `row-${r}`;
        for (let c = 0; c < ANSWER.length; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.id = `cell-${r}-${c}`;
          row.appendChild(cell);
        }
        board.appendChild(row);
      }
    }

    function buildKeyboard() {
      keyboard.innerHTML = '';
      const rows = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
      rows.forEach((rowStr, i) => {
        const rowEl = document.createElement('div');
        rowEl.className = 'kb-row';
        if (i === 2) rowEl.appendChild(makeKey('ENTER', 'wide'));
        for (const ch of rowStr) rowEl.appendChild(makeKey(ch));
        if (i === 2) rowEl.appendChild(makeKey('BACK', 'wide'));
        keyboard.appendChild(rowEl);
      });
    }

    function makeKey(label, extra) {
      const k = document.createElement('button');
      k.type = 'button';
      k.className = ('key ' + (extra || '')).trim();
      k.dataset.key = label;
      k.textContent = label === 'BACK' ? '⌫' : label;
      k.addEventListener('click', (e) => { e.preventDefault(); k.blur(); handleKey(label); });
      return k;
    }

    // ---------- Input ----------
    function handleKey(key) {
      if (gameOver || isSubmitting) return;
      if (key === 'ENTER') return submitGuess();
      if (key === 'BACK') {
        if (currentGuess.length > 0) {
          currentGuess = currentGuess.slice(0, -1);
          updateRow();
        }
        return;
      }
      if (/^[A-Z]$/.test(key) && currentGuess.length < ANSWER.length) {
        currentGuess += key;
        updateRow();
      }
    }

    function updateRow() {
      for (let c = 0; c < ANSWER.length; c++) {
        const cell = document.getElementById(`cell-${currentRow}-${c}`);
        const ch = currentGuess[c] || '';
        const had = cell.textContent;
        cell.textContent = ch;
        if (ch && !had) cell.classList.add('filled');
        if (!ch) cell.classList.remove('filled');
      }
    }

    function showMessage(msg, ms) {
      ms = ms || 1400;
      messageEl.textContent = msg;
      clearTimeout(messageEl._t);
      messageEl._t = setTimeout(() => { messageEl.textContent = ''; }, ms);
    }

    function shakeRow(r) {
      const row = document.getElementById(`row-${r}`);
      row.classList.remove('shake');
      void row.offsetWidth;
      row.classList.add('shake');
      setTimeout(() => row.classList.remove('shake'), 500);
    }

    // ---------- Wordle scoring (with proper duplicate handling) ----------
    function scoreGuess(guess, answer) {
      const result = new Array(answer.length).fill('absent');
      const rem = answer.split('');
      for (let i = 0; i < guess.length; i++) {
        if (guess[i] === rem[i]) {
          result[i] = 'correct';
          rem[i] = null;
        }
      }
      for (let i = 0; i < guess.length; i++) {
        if (result[i] === 'correct') continue;
        const idx = rem.indexOf(guess[i]);
        if (idx >= 0) {
          result[i] = 'present';
          rem[idx] = null;
        }
      }
      return result;
    }

    // ---------- Submit ----------
    function submitGuess() {
      if (currentGuess.length !== ANSWER.length) {
        shakeRow(currentRow);
        showMessage('Need ' + ANSWER.length + ' letters');
        return;
      }
      if (!VALID_GUESSES.has(currentGuess)) {
        shakeRow(currentRow);
        showMessage('Not in word list');
        return;
      }
      isSubmitting = true;
      const result = scoreGuess(currentGuess, ANSWER);
      submittedRows.push(result.slice());
      const flipDur = 500;
      const flipStagger = 240;

      for (let c = 0; c < ANSWER.length; c++) {
        const cell = document.getElementById(`cell-${currentRow}-${c}`);
        const status = result[c];
        ((cell, status, c) => {
          setTimeout(() => {
            cell.classList.add('flip');
            setTimeout(() => { cell.classList.add(status); }, flipDur / 2);
          }, c * flipStagger);
        })(cell, status, c);
      }

      const order = { absent: 0, present: 1, correct: 2 };
      for (let c = 0; c < ANSWER.length; c++) {
        const ch = currentGuess[c];
        const k = document.querySelector(`.key[data-key="${ch}"]`);
        if (!k) continue;
        const cur = k.dataset.status;
        if (!cur || order[result[c]] > order[cur]) {
          ((k, status, c) => {
            setTimeout(() => {
              k.classList.remove('absent', 'present', 'correct');
              k.classList.add(status);
              k.dataset.status = status;
            }, c * flipStagger + flipDur / 2);
          })(k, result[c], c);
        }
      }

      growEdgeFlowers();

      const totalDur = (ANSWER.length - 1) * flipStagger + flipDur + 200;
      const won = currentGuess === ANSWER;
      const submittedRow = currentRow;

      setTimeout(() => {
        isSubmitting = false;
        if (won) {
          gameOver = true;
          markAttempted(ANSWER);
          clearCurrent();
          const stats = recordWin(submittedRow);
          lastShareText = buildShareText(submittedRows, true, stats.played);
          shareBtn.disabled = false;
          const row = document.getElementById('row-' + submittedRow);
          row.classList.add('win-bounce');
          setTimeout(triggerWin, 700);
        } else {
          currentRow++;
          currentGuess = '';
          if (currentRow >= MAX_GUESSES) {
            gameOver = true;
            markAttempted(ANSWER);
            clearCurrent();
            const stats = recordLoss();
            lastShareText = buildShareText(submittedRows, false, stats.played);
            shareBtn.disabled = false;
            showMessage('The word was ' + ANSWER, 8000);
          }
        }
      }, totalDur);
    }

    // ---------- Edge flowers (per-guess) ----------
    function growEdgeFlowers() {
      const w = window.innerWidth, h = window.innerHeight;
      const isSmall = Math.min(w, h) < 600;
      const count = isSmall ? 7 : 11;
      for (let i = 0; i < count; i++) {
        const f = document.createElement('div');
        f.className = 'edge-flower';
        const useLilac = Math.random() < 0.55;
        f.innerHTML = useLilac ? lilacSVG() : roseSVG();

        const side = Math.floor(Math.random() * 4);
        const along = Math.random();
        const depthBand = isSmall ? 0.10 : 0.14;
        const depth = Math.random() * depthBand;
        let x, y;
        if (side === 0)      { x = along * w; y = depth * h; }
        else if (side === 1) { x = (1 - depth) * w; y = along * h; }
        else if (side === 2) { x = along * w; y = (1 - depth) * h; }
        else                 { x = depth * w; y = along * h; }

        const size = (isSmall ? 38 : 56) + Math.random() * (isSmall ? 26 : 40);
        f.style.left = (x - size / 2) + 'px';
        f.style.top  = (y - size / 2) + 'px';
        f.style.width  = size + 'px';
        f.style.height = size + 'px';
        const rot = (Math.random() * 60 - 30) + 'deg';
        f.style.setProperty('--rot', rot);
        f.style.animationDelay = (Math.random() * 0.5) + 's';
        flowerLayer.appendChild(f);
      }
    }

    // ---------- Win sequence ----------
    function triggerWin() {
      winOverlay.innerHTML = '';
      winOverlay.classList.add('active');

      const w = window.innerWidth, h = window.innerHeight;
      const isSmall = Math.min(w, h) < 600;
      const cellSize = isSmall ? 70 : 96;
      const cols = Math.ceil(w / cellSize) + 1;
      const rows = Math.ceil(h / cellSize) + 1;
      const cx = w / 2, cy = h / 2;
      const maxDist = Math.hypot(w / 2, h / 2);

      const GROW_MAX = 700;     // ms spread for grow-in
      const HOLD = 700;         // ms held at full coverage
      const GROW_ANIM = 700;    // matches CSS winGrow duration
      const RETRACT_SPREAD = 700;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const f = document.createElement('div');
          f.className = 'win-flower';
          const t = Math.random();
          let svg;
          if      (t < 0.32) svg = lilacSVG();
          else if (t < 0.62) svg = roseSVG();
          else if (t < 0.84) svg = wreathSVG();
          else               svg = garlandSVG();
          f.innerHTML = svg;

          const jitter = cellSize * 0.55;
          const x = c * cellSize + (Math.random() - 0.5) * jitter;
          const y = r * cellSize + (Math.random() - 0.5) * jitter;
          const size = cellSize * (0.95 + Math.random() * 0.55);
          f.style.left = (x - size / 2) + 'px';
          f.style.top  = (y - size / 2) + 'px';
          f.style.width  = size + 'px';
          f.style.height = size + 'px';

          const dist = Math.hypot(x - cx, y - cy);
          const tn = Math.min(1, dist / maxDist); // 0=center, 1=edge
          const growDelay = (1 - tn) * GROW_MAX + Math.random() * 150;
          const retractStart = GROW_MAX + GROW_ANIM + HOLD; // ~2100ms
          const retractDelay = retractStart + tn * RETRACT_SPREAD + Math.random() * 150;

          const rot = (Math.random() * 80 - 40) + 'deg';
          f.style.setProperty('--rot', rot);
          f.style.setProperty('--grow-delay', growDelay + 'ms');
          f.style.setProperty('--retract-delay', retractDelay + 'ms');

          winOverlay.appendChild(f);
        }
      }

      const msg = document.createElement('div');
      msg.className = 'win-message';
      msg.innerHTML =
        '<div class="line1">HAPPY MOTHER&rsquo;S DAY</div>' +
        '<div class="line2">&#10084;&#65039; WE LOVE YOU &#10084;&#65039;</div>';
      winOverlay.appendChild(msg);

      const actions = document.createElement('div');
      actions.className = 'win-actions';

      const replay = document.createElement('button');
      replay.type = 'button';
      replay.className = 'win-btn';
      replay.textContent = 'Play Again';
      replay.addEventListener('click', () => reset());

      const winShare = document.createElement('button');
      winShare.type = 'button';
      winShare.className = 'win-btn';
      winShare.textContent = 'Share';
      winShare.addEventListener('click', share);

      actions.appendChild(replay);
      actions.appendChild(winShare);
      winOverlay.appendChild(actions);

      const retractStart = GROW_MAX + GROW_ANIM + HOLD;
      setTimeout(() => msg.classList.add('show'), retractStart + 100);
      setTimeout(() => actions.classList.add('show'), retractStart + 800);
    }

    // ---------- Reset ----------
    function reset() {
      submittedRows.length = 0;
      ANSWER = pickAnswer();
      currentRow = 0;
      currentGuess = '';
      gameOver = false;
      isSubmitting = false;
      flowerLayer.innerHTML = '';
      winOverlay.classList.remove('active');
      winOverlay.innerHTML = '';
      messageEl.textContent = '';
      buildBoard();
      buildKeyboard();
    }

    // ---------- Stats modal ----------
    function renderStats() {
      const s = loadStats();
      const winPct = s.played > 0 ? Math.round((s.won / s.played) * 100) : 0;
      document.getElementById('stat-played').textContent = s.played;
      document.getElementById('stat-winpct').textContent = winPct;
      document.getElementById('stat-cur').textContent    = s.currentStreak;
      document.getElementById('stat-max').textContent    = s.maxStreak;

      const distEl = document.getElementById('distribution');
      distEl.innerHTML = '';
      const max = Math.max(1, ...s.distribution);
      for (let i = 0; i < 6; i++) {
        const row = document.createElement('div');
        row.className = 'dist-row';
        const label = document.createElement('div');
        label.textContent = String(i + 1);
        const bar = document.createElement('div');
        bar.className = 'dist-bar' + (i === s.lastWinRow ? ' highlight' : '');
        const count = s.distribution[i];
        const widthPct = Math.max(8, (count / max) * 100);
        bar.style.width = widthPct + '%';
        bar.textContent = String(count);
        row.appendChild(label);
        row.appendChild(bar);
        distEl.appendChild(row);
      }

      shareBtn.disabled = !lastShareText;
    }
    function openStats()  { renderStats(); statsModal.classList.add('active'); statsModal.setAttribute('aria-hidden', 'false'); }
    function closeStats() { statsModal.classList.remove('active'); statsModal.setAttribute('aria-hidden', 'true'); }

    // ---------- Wiring ----------
    retryBtn.addEventListener('click',  () => { retryBtn.blur(); reset(); });
    themeBtn.addEventListener('click',  () => { themeBtn.blur(); setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'); });
    statsBtn.addEventListener('click',  () => { statsBtn.blur(); openStats(); });
    statsClose.addEventListener('click', closeStats);
    statsBack.addEventListener('click',  closeStats);
    shareBtn.addEventListener('click',   share);

    document.addEventListener('keydown', (e) => {
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      if (statsModal.classList.contains('active')) {
        if (e.key === 'Escape') { e.preventDefault(); closeStats(); }
        return;
      }
      if (e.key === 'Enter')      { e.preventDefault(); return handleKey('ENTER'); }
      if (e.key === 'Backspace')  { e.preventDefault(); return handleKey('BACK'); }
      const k = (e.key || '').toUpperCase();
      if (/^[A-Z]$/.test(k)) handleKey(k);
    });

    reset();
  })();
  </script>
</body>
